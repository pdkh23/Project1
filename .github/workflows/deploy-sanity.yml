name: Deploy Sanity

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build root Docker image
        run: docker build -f Dockerfile -t brs-reminder-api:ci .

      - name: Verify backend Dockerfile exists
        run: test -f backend/Dockerfile
